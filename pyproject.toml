[tool.ruff]
target-version = "py312"
line-length = 100

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "alembic/versions",
    "alembic/env.py",
]

[tool.ruff.lint]
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # pyflakes (genuine code bugs, like undefined variables)
    "I", # isort (keeps your imports beautiful and organized)
    "N", # pep8-naming
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "C4", # flake8-comprehensions
    "S", # flake8-bandit
    "RUF", # Ruff-specific rules
    "FAST", # FastAPI-specific rules
    "SIM", # flake8-simplify
    "PIE", # flake8-pie
]

ignore = [
    "S101", # assert statements are fine in tests
    "B008", # FastAPI Depends() function calls in default args
    "B904", # raise ... from ... inside except
    "N999", # module names with hyphens
    "UP007", # Keep Optional[] syntax for SQLModel compatibility
    "SIM108", # ternary over if/else is subjective
    "PIE790", # unnecessary pass is fine

    # ==================================================================
    # NEW FRIENDLY ADDITIONS
    # ==================================================================
    "S311", # Stop flagging standard library 'random' as a security risk
    "S104", # Stop flagging '0.0.0.0' binding (standard for local docker/uvicorn)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "T20"]
"scripts/**/*.py" = ["T20"]

[tool.ruff.lint.isort]
known-first-party = ["api"]
known-third-party = ["fastapi", "sqlmodel", "sqlalchemy", "pydantic", "alembic"]
force-sort-within-sections = true
split-on-trailing-comma = true

[tool.ruff.lint.pep8-naming]
classmethod-decorators = ["classmethod", "validator", "model_validator"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Security"]

[tool.ruff.format]
quote-style = "double"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true

indent-style = "space"

# Like Black, it automatically handles blank lines around classes/functions.
# You can enable preview mode to test upcoming formatting adjustments.
preview = false